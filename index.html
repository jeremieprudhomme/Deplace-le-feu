<!DOCTYPE html>
<html>
<head>
	<link rel="stylesheet" href="style.css">
    <title>Déplace le feu</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/maplibre-gl@2.1.9/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@2.1.9/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
</head>
<body>
    <div id="controls">
        <select id="fire-selector">
			<!--<option value="https://raw.githubusercontent.com/jeremieprudhomme/Deplace-le-feu/refs/heads/main/FDF%20DIE.geojson">Feu de forêt de Die (Drôme) - 2026</option>
			<option value="https://raw.githubusercontent.com/jeremieprudhomme/Deplace-le-feu/refs/heads/main/FDF%20TREVILLACH.geojson">Feu de forêt de Trévillach (Pyrénées-Orientales) - 2026</option>
            <option value="https://raw.githubusercontent.com/jeremieprudhomme/Deplace-le-feu/refs/heads/main/FDF.geojson">Feu de forêt de Ribaute (Aude) - 2025</option>-->
        </select>
        <input type="text" id="address-input" placeholder="Entrez une adresse à rejoindre" autocomplete="off">
		<div id="address-results" style="display: none; position: absolute; left: 0; right: 0; background: white; border: 1px solid #ccc; max-height: 200px; overflow-y: auto; z-index: 1000;"></div>
        
    </div>
    <div id="map"></div>
    <div id="welcome-modal">
        <div id="modal-content">
            <h2>Bienvenue !</h2>
            <p>Déplace le fond de carte, la surface parcourue par le feu restera centrée.</p>
			<p>🔥 Nouveauté 2026, un menu de sélection permet de choisir entre plusieurs contours de feu.</p>
            <button onclick="closeModal()">Fermer</button>
        </div>
    </div>
    <script src="fires.js"></script>
	<script src="app.js"></script>
</body>
</html>
